databases:
  - name: blameflow-postgres
    databaseName: blameflow
    plan: free

services:
  - type: web
    name: blameflow-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blameflow-postgres
          property: connectionString
      - key: LLM_PROVIDER
        value: azure_openai
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        value: "2024-02-01"
      - key: GITHUB_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
